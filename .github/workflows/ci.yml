name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    outputs:
      scope: ${{ steps.scope.outputs.scope }}
      is_lightweight: ${{ steps.scope.outputs.is_lightweight }}
      requires_full_ci: ${{ steps.scope.outputs.requires_full_ci }}
      requires_windows_build: ${{ steps.scope.outputs.requires_windows_build }}
      requires_frontend: ${{ steps.scope.outputs.requires_frontend }}
      requires_rust: ${{ steps.scope.outputs.requires_rust }}
      requires_web_preview_qa: ${{ steps.scope.outputs.requires_web_preview_qa }}
      requires_security: ${{ steps.scope.outputs.requires_security }}
      deploy_web_preview: ${{ steps.scope.outputs.deploy_web_preview }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Detect change scope
        id: scope
        run: |
          base="${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}"
          head="${{ github.sha }}"
          node scripts/ci-change-scope.mjs \
            --base "$base" \
            --head "$head" \
            --github-output "$GITHUB_OUTPUT" \
            --json-file ci-change-scope.json

      - name: Upload change scope artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ci-change-scope
          path: ci-change-scope.json
          if-no-files-found: error

  metadata:
    name: Metadata, format, and hygiene
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run metadata verification
        run: npm run verify:metadata

  frontend:
    name: Frontend lint, tests, and builds
    needs:
      - changes
      - metadata
    if: needs.changes.outputs.requires_frontend == 'true'
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Build Web Preview
        run: npm run build:web

  web_preview_qa:
    name: Web Preview QA
    needs:
      - changes
      - metadata
    if: needs.changes.outputs.requires_web_preview_qa == 'true'
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Web Preview QA
        run: npm run qa:web-preview

      - name: Upload Web Preview QA evidence
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: web-preview-qa-evidence
          path: ${{ runner.temp }}/paydance-web-preview-qa-*
          if-no-files-found: ignore

  rust:
    name: Rust checks
    needs:
      - changes
      - metadata
    if: needs.changes.outputs.requires_rust == 'true'
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: paydance-ci-rust-windows
          add-job-id-key: false

      - name: Check Rust formatting
        run: cargo fmt --all -- --check
        working-directory: src-tauri

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

  security:
    name: Security audit
    needs:
      - changes
      - metadata
    if: needs.changes.outputs.requires_security == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Install gitleaks (pre-built)
        run: |
          version="8.24.3"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          curl -fsSL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks (detect secrets in git history)
        run: gitleaks detect --config .gitleaks.toml --verbose

      - name: Install cargo-audit (pre-built)
        run: |
          version="0.22.1"
          url="https://github.com/rustsec/rustsec/releases/download/cargo-audit/v${version}/cargo-audit-x86_64-unknown-linux-gnu-v${version}.tgz"
          expected_sha="1890badd5f15831a9af4b074399fcd21e6f7c0fe42c84e9254cdffc9f813765c"
          curl -fsSL "$url" -o cargo-audit.tgz
          echo "${expected_sha}  cargo-audit.tgz" | sha256sum -c -
          tar -xzf cargo-audit.tgz
          sudo mv "cargo-audit-x86_64-unknown-linux-gnu-v${version}/cargo-audit" /usr/local/bin/

      - name: Audit Rust dependencies
        run: cargo audit
        working-directory: src-tauri

      - name: Install cargo-deny (pre-built)
        run: |
          version="0.19.8"
          url="https://github.com/EmbarkStudios/cargo-deny/releases/download/${version}/cargo-deny-${version}-x86_64-unknown-linux-musl.tar.gz"
          expected_sha="70e769ae3872e34d45132b17040859175e11401dc12dddb0303e0b8c7d088f3f"
          curl -fsSL "$url" -o cargo-deny.tar.gz
          echo "${expected_sha}  cargo-deny.tar.gz" | sha256sum -c -
          tar -xzf cargo-deny.tar.gz
          sudo mv "cargo-deny-${version}-x86_64-unknown-linux-musl/cargo-deny" /usr/local/bin/

      - name: Check Rust dependency licenses and sources
        run: cargo deny check
        working-directory: src-tauri

  gate:
    name: CI gate
    if: always()
    needs:
      - changes
      - metadata
      - frontend
      - web_preview_qa
      - rust
      - security
    runs-on: ubuntu-latest

    steps:
      - name: Verify required jobs
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          METADATA_RESULT: ${{ needs.metadata.result }}
          REQUIRES_FRONTEND: ${{ needs.changes.outputs.requires_frontend }}
          REQUIRES_RUST: ${{ needs.changes.outputs.requires_rust }}
          REQUIRES_SECURITY: ${{ needs.changes.outputs.requires_security }}
          REQUIRES_WEB_PREVIEW_QA: ${{ needs.changes.outputs.requires_web_preview_qa }}
          RUST_RESULT: ${{ needs.rust.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          WEB_PREVIEW_QA_RESULT: ${{ needs.web_preview_qa.result }}
        run: |
          if [ "$CHANGES_RESULT" != "success" ] || [ "$METADATA_RESULT" != "success" ]; then
            exit 1
          fi

          if [ "$REQUIRES_FRONTEND" = "true" ] && [ "$FRONTEND_RESULT" != "success" ]; then
            exit 1
          fi
          if [ "$REQUIRES_WEB_PREVIEW_QA" = "true" ] && [ "$WEB_PREVIEW_QA_RESULT" != "success" ]; then
            exit 1
          fi
          if [ "$REQUIRES_RUST" = "true" ] && [ "$RUST_RESULT" != "success" ]; then
            exit 1
          fi
          if [ "$REQUIRES_SECURITY" = "true" ] && [ "$SECURITY_RESULT" != "success" ]; then
            exit 1
          fi
