name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build portable EXE
        run: npm run build:exe

      - name: Generate checksum
        shell: pwsh
        run: |
          $exePath = "src-tauri/target/release/pay-dance.exe"
          $hash = (Get-FileHash $exePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  pay-dance.exe" | Out-File -Encoding ascii "$exePath.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: pay-dance-windows-exe
          path: |
            src-tauri/target/release/pay-dance.exe
            src-tauri/target/release/pay-dance.exe.sha256
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            src-tauri/target/release/pay-dance.exe
            src-tauri/target/release/pay-dance.exe.sha256
          generate_release_notes: true
